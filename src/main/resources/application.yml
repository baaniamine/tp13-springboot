server:
  port: 8080

spring:
  security:
    oauth2:
      client:
        registration:
          # -------------------------------------------------------
          # Google OAuth2 registration — the only active provider
          # Credentials from Google Cloud Console
          # Redirect URI registered: http://localhost:8080/login/oauth2/code/google
          # -------------------------------------------------------
          google:
            client-id: ${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
            scope:
              - openid    # Required for OpenID Connect (identity layer on top of OAuth2)
              - profile   # Grants access to basic profile info (name, photo)
              - email     # Grants access to the user's email address

        provider:
          # Google uses OpenID Connect discovery to auto-resolve its endpoints
          google:
            issuer-uri: https://accounts.google.com

          # NOTE: Keycloak config is commented out because Keycloak is not running locally.
          # Spring Boot tries to contact the issuer-uri at startup to fetch OpenID metadata.
          # If Keycloak is not running, the app crashes with "Connection refused".
          # Uncomment the block below only when Keycloak is installed and running on port 8180.
          #
          # keycloak:
          #   issuer-uri: http://localhost:8180/realms/ens-realm

  thymeleaf:
    cache: false  # Disable template caching for easier development

logging:
  level:
    org.springframework.security.oauth2: DEBUG  # Trace the full OAuth2 login flow
